<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Compressor & AI Enhancer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HD Image Compressor</h1>
            <p>Kecilkan ukuran file, pertajam kualitas gambar</p>
        </header>

        <div class="main-grid">
            <section class="card glass">
                <h2>🖼️ Kompres & Enhance</h2>
                <div class="input-group">
                    <input type="file" id="upload" accept="image/*">
                </div>
                
                <div class="controls">
                    <div class="control-item">
                        <label>Format Output:</label>
                        <select id="format">
                            <option value="image/jpeg">JPEG (High Quality)</option>
                            <option value="image/webp">WebP (Sangat Ringan)</option>
                            <option value="image/png">PNG (Tanpa Hilang Detail)</option>
                        </select>
                    </div>

                    <div class="control-item">
                        <label>Target Resolusi (Upscale/Downscale):</label>
                        <select id="maxWidth">
                            <option value="3840">4K Ultra HD (3840px)</option>
                            <option value="2560">2K Quad HD (2560px)</option>
                            <option value="1920" selected>Full HD (1920px)</option>
                            <option value="1280">HD Ready (1280px)</option>
                            <option value="800">Mobile Size (800px)</option>
                        </select>
                    </div>
                    
                    <div class="control-item">
                        <label>Kualitas HD (0.1 - 1.0):</label>
                        <input type="range" id="quality" min="0.1" max="1.0" step="0.1" value="0.8">
                    </div>

                    <div class="control-item">
                        <label>Mode Pemrosesan:</label>
                        <select id="processMode">
                            <option value="balanced">Balanced (Kompres Biasa)</option>
                            <option value="enhance">Super HD Enhance (Pertajam Foto Buram)</option>
                        </select>
                    </div>

                    <button id="processBtn" onclick="compressImage()">PROSES FOTO HD</button>
                </div>

                <div id="resultArea" class="hidden">
                    <div class="stats-box">
                        <p id="sizeStats">Ukuran: 0MB ➔ 0MB</p>
                        <p id="reductionStats" class="success-msg">Hemat 0%</p>
                    </div>
                    <img id="preview" alt="Preview">
                    <a id="downloadBtn" class="btn-download">Download Hasil HD</a>
                </div>
            </section>

            <section class="card glass">
                <h2>🛰️ System Tracker</h2>
                <div class="info-list">
                    <div class="info-item">
                        <span>Jam Real-time:</span>
                        <p id="clock">00:00:00</p>
                    </div>
                    <div class="info-item">
                        <span>Lokasi & Kota:</span>
                        <p id="location-info">Mendeteksi...</p>
                    </div>
                    <div class="info-item">
                        <span>Perangkat / OS:</span>
                        <p id="browser-info">Mendeteksi...</p>
                    </div>
                    <div class="info-item">
                        <span>Resolusi Layar:</span>
                        <p id="screen-info">---</p>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
