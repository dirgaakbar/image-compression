<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompres Foto HD - Mudah & Cepat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">📸 HD-Compress</div>
            <h1>Ubah Foto Jadi HD & Kecil</h1>
            <p>Tanpa ribet, tanpa pecah. 100% Aman di perangkat Anda.</p>
        </header>

        <main class="container">
            <div class="card">
                <div class="step">
                    <span class="number">1</span>
                    <h3>Pilih Foto Kamu</h3>
                </div>
                <div class="upload-area">
                    <input type="file" id="upload" accept="image/*" onchange="handleFileSelect()">
                    <label for="upload" id="file-label">Klik untuk Pilih Foto atau Seret ke Sini</label>
                </div>

                <div class="step">
                    <span class="number">2</span>
                    <h3>Pilih Kualitas</h3>
                </div>
                
                <div class="settings-grid">
                    <div class="input-box">
                        <label>Ingin Foto Seberapa Tajam?</label>
                        <select id="maxWidth">
                            <option value="3840">Sangat Tajam (4K Ultra HD)</option>
                            <option value="1920" selected>Tajam Standar (Full HD)</option>
                            <option value="1280">Menengah (HD Ready)</option>
                            <option value="800">Kecil (Hemat Memori)</option>
                        </select>
                    </div>

                    <div class="input-box">
                        <label>Format Hasil:</label>
                        <select id="format">
                            <option value="image/jpeg">JPG (Paling Umum)</option>
                            <option value="image/webp">WebP (Paling Kecil/Ringan)</option>
                            <option value="image/png">PNG (Transparan)</option>
                        </select>
                    </div>

                    <div class="input-box full-width">
                        <label>Mode Proses:</label>
                        <select id="processMode">
                            <option value="balanced">Biasa (Hanya Kecilkan Ukuran)</option>
                            <option value="enhance">Super HD (Tajamkan Foto Buram)</option>
                        </select>
                    </div>
                </div>

                <button id="processBtn" class="main-button" onclick="compressImage()">MULAI PROSES SEKARANG</button>

                <div id="resultArea" class="result-box hidden">
                    <div class="divider"></div>
                    <h3>Hasil Foto HD Kamu:</h3>
                    <div class="comparison">
                        <p id="sizeStats">Ukuran: 0MB → 0MB</p>
                        <p id="reductionStats">Hemat 0%</p>
                    </div>
                    <img id="preview" alt="Preview Foto">
                    <a id="downloadBtn" class="download-button">SIMPAN FOTO KE GALERI</a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 HD-Compress - Privasi Aman (Proses Lokal)</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
